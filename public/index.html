<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="theme-color" content="#0a0f0a" />
    <meta name="apple-mobile-web-app-capable" content="yes" />
    <meta name="apple-mobile-web-app-status-bar-style" content="black" />
    <meta name="apple-mobile-web-app-title" content="StudyNaija" />
    <link rel="apple-touch-icon" href="android-chrome-192x192.png" />
    <link rel="manifest" href="manifest.json" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <meta name="theme-color" content="#0a0f0a" />

    <meta
      name="description"
      content="JUPEB Economics Study App - Free past questions and notes"
    />
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      html,
      body,
      #root {
        min-height: 100%;
        background: #0a0f0a;
        margin: 0;
        padding: 0;
      }
    </style>
    <title>StudyNaija - JUPEB Economics</title>
  </head>
  <body
    style="
      margin: 0;
      padding: 0;
      background: #0a0f0a;
      user-select: none;
      -webkit-user-select: none;
    "
  >
    <noscript>You need to enable JavaScript to run this app.</noscript>
    <div id="root"></div>
    <script>
      if ("ServiceWorkerRegistration" in navigator) {
        window.addEventListener("load", function () {
          navigator.ServiceWorkerRegistration
            .register("/service-worker.js")
            .then(function (reg) {
              console.log("SW registered");
            })
            .catch(function (err) {
              console.log("SW failed: ", err);
            });
        });
      }
    </script>
  </body>
</html>
